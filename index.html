<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>CIENCIAS JURÍDICAS Y POLÍTICAS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --sbg:#f5e6ec; --shover:#e8c0d0; --hbg:#3d0014; --gb:#ccc; --sh:36px; }
body { font-family:'Segoe UI',Arial,sans-serif; font-size:12px; background:#f5f5f0; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
#top-header { background:linear-gradient(90deg,#3d0f1e 0%,#5c1a2e 50%,#3d0f1e 100%); color:#d4a843; text-align:center; padding:8px 0 6px; font-family:'Playfair Display',serif; font-size:15px; font-weight:700; letter-spacing:2.5px; flex-shrink:0; border-bottom:2px solid #d4a843; text-shadow:0 1px 4px rgba(0,0,0,0.4); }
#main { display:flex; flex:1; overflow:hidden; }
#sidebar { width:300px; min-width:300px; background:var(--sbg); overflow-y:auto; flex-shrink:0; padding-bottom:1rem; border-right:2px solid #d4b0bb; }
#clear-btn { background:#8b6878; color:#fff; border:none; padding:6px 14px; border-radius:4px; cursor:pointer; font-size:12px; margin-right:6px; }
    #pdf-btn { background:linear-gradient(135deg,#8b0a2e,#c0395a); border:none; border-radius:.5rem; margin:8px; padding:8px 12px; cursor:pointer; font-size:12px; font-weight:bold; color:#fff; display:block; text-align:left; width:calc(100% - 16px); box-shadow:0 2px 8px rgba(139,10,46,0.3); }
#pdf-btn:hover { background:linear-gradient(135deg,#6e0820,#a02040); }
.year-entry { border-bottom:1px solid rgba(80,45,22,.1); }
.year-name { padding:7px 12px; cursor:pointer; font-size:12px; font-weight:bold; color:#4a0a1e; display:flex; align-items:center; gap:6px; font-family:'Playfair Display',serif; user-select:none; }
.year-name:hover, .year-name.active { background:var(--shover); color:#8b0a2e; }
.subject-name { padding:4px 12px 4px 26px; cursor:pointer; font-size:11px; color:#3a1020; display:flex; align-items:center; gap:4px; user-select:none; }
.subject-name:hover { background:rgba(255,255,255,.5); }
.subject-name.active { background:rgba(200,230,100,.45); }
.group-entry { padding:4px 12px 4px 42px; cursor:pointer; font-size:11px; color:#3a4a10; user-select:none; line-height:1.5; border-bottom:1px solid rgba(0,0,0,.04); }
.group-entry:hover { background:rgba(255,255,255,.6); }
.group-entry.selected { background:rgba(180,220,80,.7); font-weight:bold; }
.arrow { font-size:9px; transition:transform .15s; display:inline-block; }
.arrow.open { transform:rotate(90deg); }
#schedule-panel { flex:1; overflow:auto; }
#schedule-wrap { min-width:620px; }
.schedule-grid { display:grid; grid-template-columns:58px repeat(6,minmax(110px,1fr)); border-left:1px solid var(--gb); border-top:1px solid var(--gb); }
.cell { border-right:1px solid var(--gb); border-bottom:1px solid var(--gb); height:var(--sh); display:flex; align-items:center; justify-content:center; font-size:10px; position:relative; overflow:visible; }
.cell.header { background:#fff; font-weight:bold; font-size:12px; color:#333; height:30px; position:sticky; top:0; z-index:10; }
.cell.time { background:#fff; color:#444; font-size:10px; flex-direction:column; line-height:1.1; padding:2px 4px; justify-content:center; align-items:flex-end; }
.cell.time .ts { font-weight:bold; color:#333; font-size:10px; }
.cell.time .te { color:#999; font-size:9px; }
.cell.data { background:#fff; }
.sblock { position:absolute; left:2px; right:2px; top:1px; border-radius:3px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:8.5px; font-weight:bold; text-align:center; padding:2px; overflow:hidden; cursor:default; z-index:5; line-height:1.2; box-shadow:0 1px 3px rgba(0,0,0,.25); }
.sblock .sroom { font-size:8px; font-weight:normal; opacity:.9; margin-top:1px; }
.conflict-block { z-index:10 !important; animation: conflictPulse 1.5s ease-in-out infinite alternate; }
@keyframes conflictPulse { from { box-shadow: 0 0 4px 1px rgba(255,50,0,0.5); } to { box-shadow: 0 0 10px 4px rgba(255,50,0,0.9); } }
.conflict-warning { font-size:10px; font-weight:bold; color:#fff200; margin-bottom:2px; letter-spacing:0.3px; text-decoration:none !important; }
.conflict-item { font-size:8.5px; padding:2px 4px; margin:2px 0; border-radius:2px; background:rgba(0,0,0,0.30); width:100%; box-sizing:border-box; text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-decoration:none !important; color:#fff; font-weight:bold; }
#legend { padding:8px 14px 12px; font-size:11px; line-height:2; border-top:1px solid #ddd; margin-top:4px; }
#legend-title { font-weight:bold; color:#333; margin-bottom:4px; display:none; }

@media print {
  body { margin: 0; background: #fff; }
  #login-overlay, .sidebar, #sidebar, #clear-btn, #pdf-btn, a[href] { display: none !important; }
  #app-shell { display: block !important; height: auto !important; }
  #top-header { display: block !important; background: #3d0014 !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  #main { display: block !important; }
  #schedule-panel { overflow: visible !important; width: 100% !important; }
  #schedule-wrap { min-width: 0 !important; width: 100% !important; }
  .schedule-grid { grid-template-columns: 58px repeat(6, 1fr) !important; width: 100% !important; }
  #legend { display: block !important; border-top: 1px solid #ccc !important; padding: 8px 14px !important; }
  #legend-title { display: block !important; font-size: 13px; font-weight: bold; margin-bottom: 6px; }
  #legend-items { display: block !important; }
  .grid { page-break-inside: avoid; }
  .cell { border: 1px solid #ccc !important; }
  .sblock { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .conflict-block { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}

/* Login overlay */
#login-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background: linear-gradient(135deg, #3d0014 0%, #6b0024 50%, #3d0014 100%);
  z-index:9999; display:flex; align-items:center; justify-content:center;
  font-family: inherit;
}
#login-box {
  background:#fff; border-radius:12px; padding:40px 48px; text-align:center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5); min-width:320px; max-width:380px;
}
#login-box .login-logo {
  font-size:36px; margin-bottom:8px;
}
#login-box h2 {

  letter-spacing:0.5px; text-transform:uppercase;
}
#login-box .login-sub {

}
#login-box label {
  display:block; text-align:left; font-size:11px; font-weight:bold;
  color:#555; margin-bottom:4px; margin-top:14px;
}
#login-box input {
  width:100%; box-sizing:border-box; padding:9px 12px;
  border:1.5px solid #ddd; border-radius:6px; font-size:13px;
  outline:none; transition:border-color 0.2s;
}
#login-box input:focus { border-color:#7a0027; }
#login-box .login-btn {
  margin-top:22px; width:100%; padding:11px; background:#7a0027;
  color:#fff; border:none; border-radius:6px; font-size:14px;
  font-weight:bold; cursor:pointer; letter-spacing:0.5px;
  transition:background 0.2s;
}
#login-box .login-btn:hover { background:#5a001c; }
#login-error {
  margin-top:12px; color:#c0392b; font-size:12px; min-height:16px;
  display:none;
}

</style>

  {label:'6:30', end:'8:00',  val:'630'},
  {label:'8:00', end:'9:30',  val:'800'},

const DAYS = ['LU','MA','MI','JU','VI','SA'];
const DAY_LABELS = {LU:'Lunes',MA:'Martes',MI:'Miércoles',JU:'Jueves',VI:'Viernes',SA:'Sábado'};
const YEARS = ['Primer año','Segundo año','Tercer año','Cuarto año'];
const COLORS = ['#4a90d9','#e05c2a','#2ab060','#9b59b6','#e8a020','#16a085','#c0392b','#2574a9','#8e44ad','#1a7a40','#d35400','#1abc9c','#e74c3c','#3498db','#f39c12','#6c5ce7','#00b894','#fd79a8','#0984e3','#e17055'];

let expandedYears = new Set(), expandedSubjects = {}, selectedGroups = {}, colorCounter = 0;

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  ['', ...DAYS.map(d => DAY_LABELS[d])].forEach(h => {
    const c = document.createElement('div');
    c.className = 'cell header'; c.textContent = h; grid.appendChild(c);
  });
  SLOTS.forEach((slot, i) => {
    const tc = document.createElement('div');
    tc.className = 'cell time';
    tc.innerHTML = '<span class="ts">'+slot.label+'</span><span class="te">'+slot.end+'</span>';
    grid.appendChild(tc);
    DAYS.forEach(day => {
      const c = document.createElement('div');
      c.className = 'cell data'; c.id = 'cell-'+day+'-'+i; grid.appendChild(c);
    });
  });
}

function slotIdx(val) { return SLOTS.findIndex(s => s.val === String(val)); }
function clearBlocks() { document.querySelectorAll('.sblock, .conflict-block').forEach(e => e.remove()); }
function clearAll() { selectedGroups = {}; colorCounter = 0; expandedSubjects = {}; clearBlocks(); renderLegend(); buildSidebar(); }

function renderSelected() {
  clearBlocks();
  // Agrupar por celda para detectar choques
  const cellMap = {};
  Object.values(selectedGroups).forEach(info => {
    info.schedule.forEach(slot => {
      const si = slotIdx(slot.start);
      const ei = slotIdx(slot.end);
      if (si < 0) return;
      const span = Math.max(1, ei > si ? ei - si : 1);
      const key = slot.day + '-' + si;
      if (!cellMap[key]) cellMap[key] = [];
      cellMap[key].push({info, slot, si, span});
    });
  });

  Object.entries(cellMap).forEach(([key, entries]) => {
    const [day, siStr] = key.split('-');
    const si = parseInt(siStr);
    const cell = document.getElementById('cell-' + day + '-' + si);
    if (!cell) return;
    const hasConflict = entries.length > 1;
    const maxSpan = Math.max(...entries.map(e => e.span));

    if (hasConflict) {
      const block = document.createElement('div');
      block.className = 'sblock conflict-block';
      block.style.cssText = 'height:' + (maxSpan * 36 - 3) + 'px;' +
        'background:#7a0a0a;' +
        'color:#fff;border:2px solid #c0392b;';
      block.title = 'CHOQUE DE HORARIO: ' + entries.map(e => e.info.fullName + ' - Gr.: ' + e.info.groupCode + (e.slot.room ? ' | Aula: ' + e.slot.room : '')).join(' / ');

      const warnEl = document.createElement('div');
      warnEl.className = 'conflict-warning';
      warnEl.textContent = '!! CHOQUE';
      block.appendChild(warnEl);

      entries.forEach(e => {
        const color = COLORS[e.info.colorIdx % COLORS.length];
        const lineEl = document.createElement('div');
        lineEl.className = 'conflict-item';
        lineEl.title = e.info.fullName + ' - Gr.: ' + e.info.groupCode + (e.slot.room ? ' | Aula: ' + e.slot.room : '');
        const dot = document.createElement('span');
        dot.style.cssText = 'display:inline-block;width:7px;height:7px;border-radius:50%;background:' + color + ';margin-right:4px;flex-shrink:0;';
        const txt = document.createElement('span');
        txt.textContent = 'Gr.' + e.info.groupCode + ' ' + e.info.shortName;
        lineEl.style.display = 'flex';
        lineEl.style.alignItems = 'center';
        lineEl.appendChild(dot);
        lineEl.appendChild(txt);
        block.appendChild(lineEl);
      });
      cell.appendChild(block);
    } else {
      const e = entries[0];
      const color = COLORS[e.info.colorIdx % COLORS.length];
      const block = document.createElement('div');
      block.className = 'sblock';
      block.style.cssText = 'background:' + color + ';color:#fff;height:' + (e.span * 36 - 3) + 'px;';
      block.title = e.info.fullName + ' - Gr.: ' + e.info.groupCode + (e.slot.room ? ' | Aula: ' + e.slot.room : '');
      const nameEl = document.createElement('div');
      nameEl.textContent = e.info.shortName;
      block.appendChild(nameEl);
      if (e.slot.room) {
        const roomEl = document.createElement('div');
        roomEl.className = 'sroom';
        roomEl.textContent = 'Aula: ' + e.slot.room;
        block.appendChild(roomEl);
      }
      cell.appendChild(block);
    }
  });
  renderLegend();
}

function renderLegend() {
  const items = document.getElementById('legend-items');
  const title = document.getElementById('legend-title');
  const entries = Object.values(selectedGroups);
  if (!entries.length) { items.innerHTML = ''; title.style.display = 'none'; return; }
  title.style.display = 'block';

  // Detectar conflictos
  const cellMap = {};
  entries.forEach(function(info) {
    info.schedule.forEach(function(slot) {
      var si = slotIdx(slot.start);
      if (si < 0) return;
      var key = slot.day + '-' + si;
      if (!cellMap[key]) cellMap[key] = [];
      cellMap[key].push(info);
    });
  });
  const conflictGroups = new Set();
  Object.values(cellMap).forEach(function(list) {
    if (list.length > 1) list.forEach(function(info) {
      conflictGroups.add(info.groupCode + '|' + info.fullName);
    });
  });
  const conflictCount = Object.values(cellMap).filter(function(l) { return l.length > 1; }).length;

  var html = entries.map(function(e) {
    var c = COLORS[e.colorIdx % COLORS.length];
    var isConflict = conflictGroups.has(e.groupCode + '|' + e.fullName);
    var border = isConflict ? 'border:2px solid #e74c3c;' : '';
    var icon = isConflict ? ' (!!)' : '';
    return '<span style="display:inline-block;background:' + c + ';color:#fff;padding:2px 8px;border-radius:3px;margin:2px 3px;font-size:11px;' + border + '">' + e.fullName + ' - Gr.: ' + e.groupCode + icon + '</span>';
  }).join('');

  if (conflictCount > 0) {
    var msg = conflictCount + ' choque' + (conflictCount > 1 ? 's' : '') + ' de horario detectado' + (conflictCount > 1 ? 's' : '') + ' - grupos marcados con (!!) tienen conflicto';
    html = '<div style="background:#c0392b;color:#fff;padding:4px 10px;border-radius:4px;margin-bottom:6px;font-size:12px;font-weight:bold;">' + msg + '</div>' + html;
  }
  items.innerHTML = html;
}

function fmtTime(v) {
  const s = String(v);
  return s.length <= 3 ? '0'+s[0]+':'+s.slice(1) : s.slice(0,2)+':'+s.slice(2);
}

function shortName(name) {
  const stop = ['DE','LA','LOS','LAS','DEL','EL','Y','EN','A','AL','SU','E'];
  const words = name.split(' ').filter(w => !stop.includes(w));
  return words.slice(0, 3).join(' ');
}

function buildSidebar() {
  const container = document.getElementById('year-list');
  container.innerHTML = '';
  YEARS.forEach(year => {
    const isActive = expandedYears.has(year);
    const wrap = document.createElement('div');
    wrap.className = 'year-entry';
    const nameEl = document.createElement('div');
    nameEl.className = 'year-name' + (isActive ? ' active' : '');
    nameEl.innerHTML = '<span class="arrow '+(isActive?'open':'')+'">▶</span>'+year.toUpperCase();
    nameEl.onclick = () => toggleYear(year);
    wrap.appendChild(nameEl);
    if (expandedYears.has(year) && DERECHO_DATA[year]) {
      DERECHO_DATA[year].forEach(subj => {
        if (!subj.groups || !subj.groups.length) return;
        const subjKey = year + ':' + subj.name;
        const isSubjOpen = !!expandedSubjects[subjKey];
        const isSubjSel = !!selectedGroups[subjKey];
        const subjWrap = document.createElement('div');
        const subjEl = document.createElement('div');
        subjEl.className = 'subject-name' + (isSubjOpen || isSubjSel ? ' active' : '');
        subjEl.innerHTML = '<span class="arrow '+(isSubjOpen?'open':'')+'">▶</span>'+subj.name;
        subjEl.onclick = () => { expandedSubjects[subjKey] = !isSubjOpen; buildSidebar(); };
        subjWrap.appendChild(subjEl);
        if (isSubjOpen) {
          subj.groups.forEach(grp => {
            const isSelected = selectedGroups[subjKey]?.groupCode === grp.code;
            const days = [...new Set(grp.schedule.map(s => s.day))].map(d => DAY_LABELS[d].slice(0,2)).join('/');
            const times = [...new Set(grp.schedule.map(s => fmtTime(s.start)))].join(', ');
            const grpEl = document.createElement('div');
            grpEl.className = 'group-entry' + (isSelected ? ' selected' : '');
            grpEl.innerHTML =
              '<b>Gr.: '+grp.code+'</b> <span style="color:#555;font-weight:normal">('+days+': '+times+')</span><br>' +
              '<span style="padding-left:8px;color:#7a0027;font-style:italic;font-size:10px">'+grp.docente+'</span>';
            grpEl.onclick = () => toggleGroup(subjKey, subj, grp);
            subjWrap.appendChild(grpEl);
          });
        }
        wrap.appendChild(subjWrap);
      });
    }
    container.appendChild(wrap);
  });
}

function toggleYear(year) {
  if (expandedYears.has(year)) { expandedYears.delete(year); }
  else { expandedYears.add(year); }
  buildSidebar();
}

function toggleGroup(subjKey, subj, grp) {
  if (selectedGroups[subjKey]?.groupCode === grp.code) {
    delete selectedGroups[subjKey];
  } else {
    const prevColor = selectedGroups[subjKey]?.colorIdx;
    const colorIdx = prevColor !== undefined ? prevColor : colorCounter++;
    selectedGroups[subjKey] = { groupCode: grp.code, colorIdx, fullName: subj.name, shortName: shortName(subj.name), docente: grp.docente || '', schedule: grp.schedule };
  }
  renderSelected();
  buildSidebar();
}

function downloadPDF() {
  if (!Object.keys(selectedGroups).length) { alert('Selecciona al menos un grupo para descargar el horario.'); return; }

function doLogin() {
  const user = document.getElementById('inp-user').value.trim();
  const pass = document.getElementById('inp-pass').value.trim();
  const errEl = document.getElementById('login-error');
  if (user === 'usuario' && VALID_PASSWORDS.has(pass)) {
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app-shell').style.display = 'flex';
    errEl.style.display = 'none';
  } else {
    errEl.style.display = 'block';
    document.getElementById('inp-pass').value = '';
    document.getElementById('inp-pass').focus();
  }
}

// Allow Enter key to submit
document.addEventListener('DOMContentLoaded', function() {
  ['inp-user','inp-pass'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  });
});

buildGrid();
buildSidebar();
